services:
  db:
    image: postgres:16
    container_name: db_postgres
    environment:
      POSTGRES_DB: pin_desk
      POSTGRES_USER: pin
      POSTGRES_PASSWORD: pin
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pin -d pin_desk"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./Source
    container_name: backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./Source/.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: nginx:alpine
    container_name: frontend
    restart: always
    depends_on:
      - backend
    volumes:
      - ./Frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

volumes:
  db_data:
