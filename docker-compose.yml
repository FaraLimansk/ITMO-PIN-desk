services:
  db:
    image: postgres:16
    container_name: db_postgres
    environment:
      POSTGRES_DB: pin_desk
      POSTGRES_USER: pin
      POSTGRES_PASSWORD: pin
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./Source
    container_name: backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"

  frontend:
    image: nginx:alpine
    container_name: frontend
    restart: always
    depends_on:
      - backend
    volumes:
      - ./Frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

volumes:
  db_data:
